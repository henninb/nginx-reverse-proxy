# user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  server_tokens off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Allow headers with underscores (for X-CSRF-TOKEN, etc.)
  underscores_in_headers on;

  include /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # Security headers
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  error_log /dev/stderr warn;
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /dev/stdout  main;

  # SSL certificate selection by SNI
  map $ssl_server_name $ssl_cert_file {
    ~*\.brianhenning\.com$ /etc/ssl/certs/brianhenning.fullchain.pem;
    ~*\.bhenning\.com$     /etc/ssl/certs/bhenning.fullchain.pem;
    default                /etc/ssl/certs/bhenning.fullchain.pem;
  }

  map $ssl_server_name $ssl_key_file {
    ~*\.brianhenning\.com$ /etc/ssl/private/brianhenning.privkey.pem;
    ~*\.bhenning\.com$     /etc/ssl/private/bhenning.privkey.pem;
    default                /etc/ssl/private/bhenning.privkey.pem;
  }

  upstream ddwrt {
    server 192.168.10.2:443;
  }

  upstream pfsense {
    server 192.168.10.1:8006;
  }

  upstream forgejo {
    server 192.168.10.10:80;
  }

  upstream influxdb {
    server 192.168.10.10:8086;
  }

  upstream finance {
    server 192.168.10.10:8443;
  }

  upstream proxmox {
    server 192.168.10.5:8006;
  }

  upstream switch0 {
    server 192.168.10.30:80;
  }

  upstream switch1 {
    server 192.168.10.31:80;
  }

  upstream jellyfin {
    server 192.168.7.175:8096;
  }

  upstream frigate {
    server 192.168.7.175:8971;
  }


  upstream hdhomerun {
    server 192.168.10.60:80;
  }


  upstream keylight {
    server 192.168.4.23:9123;
  }

  # ssl_certificate /etc/ssl/certs/proxy.crt;
  # ssl_certificate_key /etc/ssl/private/proxy.key;
  proxy_headers_hash_bucket_size 128;
  # proxy_buffering off;

  server {
    listen 443 ssl;
    http2 on;
    server_name pfsense.bhenning.com pfsense.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass https://pfsense;
      proxy_ssl_server_name on;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name vercel.bhenning.com vercel.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # DNS resolver for dynamic Vercel hostname resolution
    resolver 192.168.10.1 valid=300s;
    resolver_timeout 5s;

    # Local Next.js APIs - pass through to Vercel (must come before general /api/ block)
    location ~ ^/api/(nhl|nba|nfl|mlb|celsius|fahrenheit|lead|player-ads|player-analytics|player-heartbeat|player-metadata|weather|uuid|human|categorize|geocode|planets)(/.*)?$ {
      set $vercel_backend "nextjs-website-alpha-weld.vercel.app";
      proxy_pass https://$vercel_backend$request_uri;
      proxy_set_header Host $vercel_backend;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
      proxy_ssl_name $vercel_backend;
    }

    # Special handling for GraphQL - map /api/graphql to /graphql
    location /api/graphql {
      proxy_pass https://finance/graphql;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    # Direct GraphQL endpoint
    location /graphql {
      proxy_pass https://finance/graphql;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    # Route remaining API calls to local finance service
    location /api/ {
      proxy_pass https://finance/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    location / {
      set $vercel_backend "nextjs-website-alpha-weld.vercel.app";
      proxy_pass https://$vercel_backend;
      proxy_set_header Host $vercel_backend;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
      proxy_ssl_name $vercel_backend;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name netlify.bhenning.com netlify.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # DNS resolver for dynamic backend hostname resolution
    resolver 192.168.10.1 valid=300s;
    resolver_timeout 5s;

    # Special handling for GraphQL - map /api/graphql to /graphql
    location /api/graphql {
      proxy_pass https://finance/graphql;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    # Direct GraphQL endpoint
    location /graphql {
      proxy_pass https://finance/graphql;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    # Route remaining API calls to local finance service
    location /api/ {
      proxy_pass https://finance/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }

    location / {
      set $vercel_backend "nextjs-website-alpha-weld.vercel.app";
      proxy_pass https://$vercel_backend;
      proxy_set_header Host $vercel_backend;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
      proxy_ssl_name $vercel_backend;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name finance.bhenning.com finance.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    # Block sensitive endpoints from external access
    location ~ ^/(actuator|performance|graphiql) {
      return 403;
    }

    location / {
      proxy_pass https://finance;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-CSRF-TOKEN $http_x_csrf_token;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name influxdb.bhenning.com influxdb.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://influxdb;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name forgejo.bhenning.com forgejo.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://forgejo;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name ddwrt.bhenning.com ddwrt.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass https://ddwrt;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection keep-alive;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Referer $http_referer;
      chunked_transfer_encoding off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name jellyfin.bhenning.com jellyfin.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://jellyfin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }
  }

  server {
    listen 443 ssl;
    http2 off;
    server_name proxmox.bhenning.com proxmox.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    # Override global X-Frame-Options to allow console iframe
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
      proxy_pass https://proxmox;
      proxy_ssl_name $host;
      proxy_ssl_server_name on;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;

      # WebSocket support for noVNC/SPICE console
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Increase timeouts for console sessions
      proxy_connect_timeout 7d;
      proxy_send_timeout 7d;
      proxy_read_timeout 7d;

      # Disable buffering for real-time console
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 off;
    server_name switch0.bhenning.com switch0.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://switch0;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass_request_headers on;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name switch1.bhenning.com switch1.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://switch1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass_header Access-Control-Allow-Origin;
      proxy_pass_header Access-Control-Allow-Methods;
      proxy_pass_header Access-Control-Allow-Headers;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name frigate.bhenning.com frigate.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass https://frigate;
      proxy_ssl_server_name on;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name hdhomerun.bhenning.com hdhomerun.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://hdhomerun;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name keylight.bhenning.com keylight.brianhenning.com;

    ssl_certificate $ssl_cert_file;
    ssl_certificate_key $ssl_key_file;

    location / {
      proxy_pass http://keylight;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/ssl/certs/bhenning.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/bhenning.privkey.pem;

    location / {
      return 404;
    }
  }
}

stream {
  upstream forgejo_ssh {
    server 192.168.10.10:2222;
  }

  upstream postgresql {
    server 192.168.10.10:5432;
  }

  upstream printer {
    server 192.168.4.22:9100;
  }

  upstream hdhomerun_stream {
    server 192.168.10.60:5004;
  }

  upstream tapo-camera-office {
    server 192.168.7.247:554;
  }

  upstream tapo-camera-east {
    server 192.168.7.219:554;
  }

  upstream tapo-camera-west {
    server 192.168.7.224:554;
  }

  upstream amcrest-frontdoor {
    server 192.168.7.223:554;
  }


  server {
    listen 2222;
    proxy_pass forgejo_ssh;
    proxy_connect_timeout 5s;
  }

  server {
    listen 5432;
    proxy_pass postgresql;
    proxy_connect_timeout 5s;
  }

  server {
    listen 9100;
    proxy_pass printer;
    proxy_connect_timeout 5s;
  }

  server {
    listen 5004 ssl;
    ssl_certificate /etc/ssl/certs/bhenning.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/bhenning.privkey.pem;
    proxy_pass hdhomerun_stream;
    proxy_connect_timeout 5s;
  }

  server {
    listen 554;
    proxy_pass tapo-camera-office;
    proxy_connect_timeout 5s;
  }

  server {
    listen 555;
    proxy_pass tapo-camera-east;
    proxy_connect_timeout 5s;
  }

  server {
    listen 556;
    proxy_pass tapo-camera-west;
    proxy_connect_timeout 5s;
  }

  server {
    listen 557;
    proxy_pass amcrest-frontdoor;
    proxy_connect_timeout 5s;
  }

}

